version: 2
updates:
  # Keep the third-party actions in the trusted signer current. Review major bumps carefully —
  # this repo is a supply-chain trust root.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    # Batch all action updates into ONE PR/week instead of one-per-action (less noise; a single CI run).
    groups:
      github-actions:
        patterns: ["*"]
