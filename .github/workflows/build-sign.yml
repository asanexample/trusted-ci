name: Build + sign (shared)

# Reusable workflow (SLSA Build L3 supply chain, platform #131 / ADR-042). Builds a container image from
# the CALLING app repo's Dockerfile, pushes it to the caller team's ECR repo, then cosign-keyless-signs it
# and attaches a CycloneDX SBOM attestation — all under THIS workflow's GitHub OIDC identity (Fulcio/Rekor).
#
# Kyverno's verify-images / verify-attestations(SBOM) admit only images signed by this identity, gated
# per-team by the cert's githubWorkflowRepository extension (= the CALLING app repo, which Fulcio sets from
# the caller's own OIDC — another team cannot forge it). This lives in a repo app teams cannot write to, so a
# compromised app build cannot alter the signing steps.
#
# SLSA provenance is a SEPARATE sibling job in the caller (asanexample/trusted-ci/.github/workflows/
# slsa-provenance.yml) — deliberately NOT nested inside this workflow, so every reusable call from an app is
# exactly ONE level deep (the OIDC job_workflow_ref / repository claims are known behavior at that depth).

on:
  workflow_call:
    inputs:
      app:
        description: "App name; the image is pushed to team-<team>/<app> (team derived from the app-<team> repo name)."
        required: true
        type: string
      product:
        description: "Product short name (ADR-069). Selects the per-Product OIDC role github-actions-ecr-push-product-<team>-<product>, which trusts only the Product's repo and is scoped to team-<team>/<product>-* in ECR. The caller derives it from its Product registry entry; spoofing it just selects a role whose trust policy won't match the caller."
        required: true
        type: string
      tag:
        description: "Image tag to push (e.g. the commit SHA or PR head SHA)."
        required: true
        type: string
      context:
        description: "Docker build context."
        required: false
        type: string
        default: "."
      dockerfile:
        description: "Path to the Dockerfile, relative to the context."
        required: false
        type: string
        default: "Dockerfile"
      build-args:
        description: "Newline-separated docker build args (KEY=VALUE)."
        required: false
        type: string
        default: ""
      target:
        description: "Optional Dockerfile target stage."
        required: false
        type: string
        default: ""
      platforms:
        description: "Comma-separated build platforms. Defaults to multi-arch (amd64+arm64) so images run on
          Graviton/t4g nodes. QEMU is set up below for emulated arch; Go/compiled apps should cross-compile in
          their Dockerfile (FROM --platform=$BUILDPLATFORM + $TARGETARCH) to build natively (no emulation)."
        required: false
        type: string
        default: "linux/amd64,linux/arm64"
      ecr-registry:
        description: "ECR registry host. Defaults to the platform account ECR."
        required: false
        type: string
        default: "829808296602.dkr.ecr.us-east-1.amazonaws.com"
    outputs:
      image:
        description: "Image reference WITHOUT tag (registry/team-<team>/<app>)."
        value: ${{ jobs.build.outputs.image }}
      digest:
        description: "Pushed image digest (sha256:...)."
        value: ${{ jobs.build.outputs.digest }}

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT: "829808296602"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC for BOTH the AWS assume-role (ECR push) and Sigstore keyless signing
      contents: read
    outputs:
      image: ${{ steps.meta.outputs.image }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      # Validate inputs (these flow into run: steps below — an unsanitized value would be shell injection in
      # a workflow app teams cannot otherwise influence) and derive the caller's team from its app-<team> repo
      # name (NOT a caller input — cannot be spoofed). Resolve the per-PRODUCT ECR push role + image repo (ADR-069
      # §5): we assume github-actions-ecr-push-product-<team>-<product>, which trusts ONLY the Product's repo and is
      # scoped to team-<team>/<product>-* in ECR. `team` is derived (unspoofable); `product` is a caller input but
      # is not a trust boundary — AWS honours only the OIDC sub/aud in the role's trust conditions, so a wrong
      # product just names a role whose trust won't match the caller's sub (assume-role fails). Mirrors
      # slsa-provenance.yml's guard.
      - name: Resolve team + image
        id: meta
        env:
          APP: ${{ inputs.app }}
          PRODUCT: ${{ inputs.product }}
          REGISTRY: ${{ inputs.ecr-registry }}
          CALLER: ${{ github.repository }}
        run: |
          set -euo pipefail
          case "$APP" in
            "" | *[!a-z0-9-]*) echo "::error::invalid app name '$APP' (must match ^[a-z0-9-]+$)"; exit 1 ;;
          esac
          case "$PRODUCT" in
            "" | *[!a-z0-9-]*) echo "::error::invalid product name '$PRODUCT' (must match ^[a-z0-9-]+$)"; exit 1 ;;
          esac
          repo_name="${CALLER##*/}"   # asanexample/app-bravo -> app-bravo
          team="${repo_name#app-}"    # app-bravo -> bravo
          if [ "$team" = "$repo_name" ]; then
            echo "::error::caller '$CALLER' is not an app-<team> repo; refusing to build"; exit 1
          fi
          echo "role_arn=arn:aws:iam::${AWS_ACCOUNT}:role/github-actions-ecr-push-product-${team}-${PRODUCT}" >> "$GITHUB_OUTPUT"
          echo "image=${REGISTRY}/team-${team}/${APP}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (caller team's ECR role)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ steps.meta.outputs.role_arn }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # Enables building non-native architectures (e.g. arm64 on an amd64 runner). Apps that cross-compile in
      # their Dockerfile won't hit emulation; this is the fallback for those that build natively per-arch.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.context }}/${{ inputs.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.image }}:${{ inputs.tag }}
          build-args: ${{ inputs.build-args }}
          target: ${{ inputs.target }}
          platforms: ${{ inputs.platforms }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          # Pin cosign v2: legacy `.att` DSSE attestation, which Kyverno's default attestor verifies
          # (cosign v3's bundle/referrers format needs Kyverno's opt-in SigstoreBundle).
          cosign-release: "v2.5.2"

      # Keyless signing via THIS workflow's GitHub OIDC identity. Sign by DIGEST.
      - name: Sign image (cosign keyless)
        env:
          REF: ${{ steps.meta.outputs.image }}@${{ steps.build.outputs.digest }}
        run: cosign sign --yes "$REF"

      - name: Install Syft (download release binary + verify SHA-256)
        env:
          SYFT_VERSION: "1.44.0" # latest stable; verify before bumping
        run: |
          set -euo pipefail
          base="https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}"
          asset="syft_${SYFT_VERSION}_linux_amd64.tar.gz"
          curl -sfL "${base}/${asset}" -o "${asset}"
          curl -sfL "${base}/syft_${SYFT_VERSION}_checksums.txt" -o syft_checksums.txt
          grep " ${asset}\$" syft_checksums.txt | sha256sum -c -
          tar xzf "${asset}" syft
          sudo install -m 0755 syft /usr/local/bin/syft
          rm -f syft "${asset}" syft_checksums.txt
          syft --version

      # CycloneDX SBOM, attached as a keyless-signed attestation under the same OIDC identity as the
      # signature. Kyverno's verify-attestations(SBOM) requires it at admission.
      - name: Generate + attest SBOM (CycloneDX, cosign keyless)
        env:
          REF: ${{ steps.meta.outputs.image }}@${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          syft "$REF" -o cyclonedx-json=sbom.cdx.json
          cosign attest --yes --type cyclonedx --predicate sbom.cdx.json "$REF"
